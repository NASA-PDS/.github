name: Stale PR Slack Notification

on:
  schedule:
    # Weekdays at 9am UTC (1am/2am Pacific depending on DST)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  notify-stale-prs:
    name: Notify stale PRs via Slack webhook
    runs-on: ubuntu-latest

    steps:
      - name: Find open PRs (>3 days old, non-Dependabot)
        id: stale
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '3 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-3d '+%Y-%m-%dT%H:%M:%SZ')

          gh api graphql --paginate -f query='
            query($endCursor: String) {
              search(
                query: "org:NASA-PDS is:pr is:open draft:false -author:app/dependabot created:<'"$CUTOFF"'"
                type: ISSUE
                first: 100
                after: $endCursor
              ) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  ... on PullRequest {
                    number
                    title
                    url
                    updatedAt
                    createdAt
                    author { login }
                    repository { nameWithOwner }
                    assignees(first: 5) { nodes { login } }
                    labels(first: 5) { nodes { name } }
                    reviewDecision
                    reviews(last: 1) { nodes { state author { login } } }
                  }
                }
              }
            }
          ' --jq '.data.search.nodes[]' > stale_prs.json

          COUNT=$(jq -s 'length' stale_prs.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build and send Slack message
        if: steps.stale.outputs.count != '0'
        env:
          SLACK_WORKFLOW_WEBHOOK_URL: ${{ secrets.SLACK_WORKFLOW_WEBHOOK_URL }}
          COUNT: ${{ steps.stale.outputs.count }}
        run: |
          if [ -z "$SLACK_WORKFLOW_WEBHOOK_URL" ]; then
            echo "SLACK_WORKFLOW_WEBHOOK_URL secret is not set — skipping notification"
            exit 0
          fi

          TODAY=$(date -u '+%Y-%m-%d')
          NOW=$(date -u '+%s')

          # Build Slack Block Kit payload — max 22 PRs to stay under 50-block limit
          jq -s --arg today "$TODAY" --arg count "$COUNT" --argjson now "$NOW" '
            def days_old(dt):
              ($now - (dt | sub("\\.[0-9]+Z$"; "Z") | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)) / 86400 | floor;
            def review_label(r):
              if r == "APPROVED" then "✅ Approved"
              elif r == "CHANGES_REQUESTED" then "🔴 Changes Requested"
              elif r == "REVIEW_REQUIRED" then "👀 Review Required"
              else "💬 No Reviews" end;
            def label_str(ls):
              if (ls | length) > 0 then " [" + (ls | join(", ")) + "]" else "" end;
            def assignee_str(as):
              if (as | length) > 0 then as | join(", ") else "unassigned" end;
            sort_by(.createdAt) as $sorted |
            ($sorted | length) as $total |
            ($sorted | .[:22]) as $shown |
            [
              {"type": "header", "text": {"type": "plain_text", "text": "🌵 Tumbleweeds Report — \($today)", "emoji": true}},
              {"type": "context", "elements": [{"type": "mrkdwn", "text": "\($count) open PR(s) created more than 3 days ago"}]},
              {"type": "divider"}
            ] +
            ($shown | map(. as $pr | [
              {"type": "section", "text": {"type": "mrkdwn",
                "text": "*<\($pr.url)|\($pr.repository.nameWithOwner) #\($pr.number) — \($pr.title)\(label_str($pr.labels.nodes | map(.name)))>*"}},
              {"type": "context", "elements": [{"type": "mrkdwn",
                "text": "\(days_old($pr.createdAt))d old | \(review_label($pr.reviewDecision)) | \(assignee_str($pr.assignees.nodes | map(.login)))"}]}
            ]) | flatten) +
            if $total > 22 then
              [{"type": "section", "text": {"type": "mrkdwn",
                "text": "_...and \($total - 22) more. See <https://github.com/NASA-PDS|NASA-PDS on GitHub>._"}}]
            else [] end
          ' stale_prs.json > blocks.json

          jq -n --slurpfile blocks blocks.json '{"blocks": $blocks[0]}' > payload.json
          curl -s -f -X POST "$SLACK_WORKFLOW_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @payload.json
