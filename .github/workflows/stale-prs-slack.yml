name: Stale PR Slack Notification

on:
  schedule:
    # Weekdays at 9am UTC (1am/2am Pacific depending on DST)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  notify-stale-prs:
    name: Notify stale PRs via Slack webhook
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ignored repos from pds-products.yaml
        run: |
          python3 -c "
          import yaml, json
          with open('conf/pds-products.yaml') as f:
              data = yaml.safe_load(f)
          repos = [
              'NASA-PDS/' + r
              for p in data['products'].values()
              if p.get('ignore', False)
              for r in p.get('repositories', [])
          ]
          print(json.dumps(repos))
          " > ignored_repos.json

      - name: Find open PRs (>3 days old, non-draft; Dependabot security PRs included)
        id: stale
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '3 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-3d '+%Y-%m-%dT%H:%M:%SZ')

          gh api graphql --paginate -f query='
            query($endCursor: String) {
              search(
                query: "org:NASA-PDS is:pr is:open draft:false created:<'"$CUTOFF"'"
                type: ISSUE
                first: 100
                after: $endCursor
              ) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  ... on PullRequest {
                    number
                    title
                    url
                    createdAt
                    author { login }
                    repository { nameWithOwner }
                    assignees(first: 5) { nodes { login } }
                    labels(first: 5) { nodes { name } }
                    reviewDecision
                  }
                }
              }
            }
          ' --jq '.data.search.nodes[]' > stale_prs.json

          COUNT=$(jq -s 'length' stale_prs.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build and send Slack message
        if: steps.stale.outputs.count != '0'
        env:
          SLACK_WORKFLOW_WEBHOOK_URL: ${{ secrets.SLACK_WORKFLOW_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WORKFLOW_WEBHOOK_URL" ]; then
            echo "SLACK_WORKFLOW_WEBHOOK_URL secret is not set — skipping notification"
            exit 0
          fi

          .github/scripts/build-slack-payload.sh stale_prs.json ignored_repos.json > payload.json

          curl -s -f -X POST "$SLACK_WORKFLOW_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @payload.json
