name: Stale PR Slack Notification

on:
  schedule:
    # Weekdays at 9am UTC (1am/2am Pacific depending on DST)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  notify-stale-prs:
    name: Notify stale PRs via Slack webhook
    runs-on: ubuntu-latest

    steps:
      - name: Find open PRs (>3 days old, non-Dependabot)
        id: stale
        env:
          GH_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '3 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-3d '+%Y-%m-%dT%H:%M:%SZ')

          gh api graphql --paginate -f query='
            query($endCursor: String) {
              search(
                query: "org:NASA-PDS is:pr is:open draft:false -author:app/dependabot created:<'"$CUTOFF"'"
                type: ISSUE
                first: 100
                after: $endCursor
              ) {
                pageInfo { hasNextPage endCursor }
                nodes {
                  ... on PullRequest {
                    number
                    title
                    url
                    updatedAt
                    createdAt
                    author { login }
                    repository { nameWithOwner }
                    assignees(first: 5) { nodes { login } }
                    labels(first: 5) { nodes { name } }
                    reviewDecision
                    reviews(last: 1) { nodes { state author { login } } }
                  }
                }
              }
            }
          ' --jq '.data.search.nodes[]' > stale_prs.json

          COUNT=$(jq -s 'length' stale_prs.json)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Build and send Slack message
        if: steps.stale.outputs.count != '0'
        env:
          SLACK_WORKFLOW_WEBHOOK_URL: ${{ secrets.SLACK_WORKFLOW_WEBHOOK_URL }}
          COUNT: ${{ steps.stale.outputs.count }}
        run: |
          TODAY=$(date -u '+%Y-%m-%d')
          NOW=$(date -u '+%s')

          # Format each PR as a multi-line entry with rich metadata
          jq -r --argjson now "$NOW" '
            . as $pr |
            ($now - ($pr.updatedAt | sub("\\.[0-9]+Z$"; "Z") | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)) / 86400 | floor as $days |
            ($pr.labels.nodes | map(.name) | if length > 0 then " [" + join(", ") + "]" else "" end) as $labels |
            ($pr.reviewDecision // "NO_REVIEWS") as $review |
            ($pr.assignees.nodes | map(.login) | if length > 0 then join(", ") else "unassigned" end) as $assignees |
            "• [\($pr.repository.nameWithOwner)] #\($pr.number) — \($pr.title)\($labels)",
            "  \($days)d stale | \($review) | \($assignees) | \($pr.url)",
            ""
          ' stale_prs.json > pr_lines.txt

          {
            printf '🌵 Tumbleweeds Report — %s\n' "$TODAY"
            printf '%s open PR(s) created more than 3 days ago:\n\n' "$COUNT"
            cat pr_lines.txt
          } > message.txt

          if [ "$(wc -c < message.txt)" -gt 2900 ]; then
            truncate -s 2900 message.txt
            printf '\n... and more. See https://github.com/NASA-PDS for full list.' >> message.txt
          fi

          if [ -z "$SLACK_WORKFLOW_WEBHOOK_URL" ]; then
            echo "SLACK_WORKFLOW_WEBHOOK_URL secret is not set — skipping notification"
            exit 0
          fi

          jq -n --rawfile text message.txt '{"message_text": $text}' > payload.json
          curl -s -f -X POST "$SLACK_WORKFLOW_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @payload.json
